<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <!-- Hero Gradient - matches your theme -->
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#192841;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#253c5c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1b4d3d;stop-opacity:1" />
    </linearGradient>

    <!-- Accent Gradient (emerald) -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1ebd77;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#28e092;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1ebd77;stop-opacity:1" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Soft Shadow -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3" />
    </filter>

    <!-- Building Silhouette Pattern -->
    <linearGradient id="buildingFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>

    <!-- Subtle grid pattern -->
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="60" y2="0" stroke="#ffffff" stroke-width="0.5" opacity="0.03" />
      <line x1="0" y1="0" x2="0" y2="60" stroke="#ffffff" stroke-width="0.5" opacity="0.03" />
    </pattern>

    <!-- Dot pattern -->
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" opacity="0.04" />
    </pattern>
  </defs>

  <!-- Background with theme gradient -->
  <rect width="1200" height="500" fill="url(#heroGradient)" rx="20" />
  <rect width="1200" height="500" fill="url(#grid)" rx="20" />
  <rect width="1200" height="500" fill="url(#dots)" rx="20" />

  <!-- Decorative top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accentGradient)" rx="1.5" />

  <!-- Abstract geometric decorations -->
  <circle cx="150" cy="120" r="80" fill="none" stroke="#1ebd77" stroke-width="1" opacity="0.08" />
  <circle cx="150" cy="120" r="50" fill="none" stroke="#1ebd77" stroke-width="1" opacity="0.12" />
  <circle cx="150" cy="120" r="25" fill="#1ebd77" opacity="0.08" />

  <circle cx="1050" cy="380" r="100" fill="none" stroke="#1ebd77" stroke-width="1" opacity="0.06" />
  <circle cx="1050" cy="380" r="60" fill="none" stroke="#1ebd77" stroke-width="1" opacity="0.1" />
  <circle cx="1050" cy="380" r="30" fill="#1ebd77" opacity="0.06" />

  <!-- Faint Building/Mansion Silhouette at Bottom -->
  <g opacity="0.12">
    <!-- Main building block -->
    <rect x="300" y="360" width="600" height="140" fill="#ffffff" rx="2" />
    
    <!-- Left wing -->
    <rect x="220" y="400" width="100" height="100" fill="#ffffff" rx="2" />
    
    <!-- Right wing -->
    <rect x="880" y="400" width="100" height="100" fill="#ffffff" rx="2" />
    
    <!-- Central dome/tower -->
    <path d="M540,360 L560,300 L580,310 L600,280 L620,310 L640,300 L660,360 Z" fill="#ffffff" />
    
    <!-- Left tower -->
    <path d="M320,400 L335,340 L350,340 L365,340 L380,400 Z" fill="#ffffff" />
    
    <!-- Right tower -->
    <path d="M820,400 L835,340 L850,340 L865,340 L880,400 Z" fill="#ffffff" />
    
    <!-- Columns on main building -->
    <rect x="340" y="380" width="8" height="120" fill="#1a1a2e" opacity="0.5" />
    <rect x="380" y="380" width="8" height="120" fill="#1a1a2e" opacity="0.5" />
    <rect x="420" y="380" width="8" height="120" fill="#1a1a2e" opacity="0.5" />
    <rect x="460" y="380" width="8" height="120" fill="#1a1a2e" opacity="0.5" />
    <rect x="500" y="380" width="8" height="120" fill="#1a1a2e" opacity="0.5" />
    <rect x="540" y="380" width="8" height="120" fill="#1a1a2e" opacity="0.5" />
    <rect x="580" y="380" width="8" height="120" fill="#1a1a2e" opacity="0.5" />
    <rect x="620" y="380" width="8" height="120" fill="#1a1a2e" opacity="0.5" />
    <rect x="660" y="380" width="8" height="120" fill="#1a1a2e" opacity="0.5" />
    <rect x="700" y="380" width="8" height="120" fill="#1a1a2e" opacity="0.5" />
    <rect x="740" y="380" width="8" height="120" fill="#1a1a2e" opacity="0.5" />
    <rect x="780" y="380" width="8" height="120" fill="#1a1a2e" opacity="0.5" />
    <rect x="820" y="380" width="8" height="120" fill="#1a1a2e" opacity="0.5" />

    <!-- Windows row 1 -->
    <g fill="#1a1a2e" opacity="0.4">
      <circle cx="360" cy="420" r="5" />
      <circle cx="400" cy="420" r="5" />
      <circle cx="440" cy="420" r="5" />
      <circle cx="480" cy="420" r="5" />
      <circle cx="520" cy="420" r="5" />
      <circle cx="560" cy="420" r="5" />
      <circle cx="600" cy="420" r="5" />
      <circle cx="640" cy="420" r="5" />
      <circle cx="680" cy="420" r="5" />
      <circle cx="720" cy="420" r="5" />
      <circle cx="760" cy="420" r="5" />
      <circle cx="800" cy="420" r="5" />
    </g>

    <!-- Windows row 2 -->
    <g fill="#1a1a2e" opacity="0.3">
      <circle cx="360" cy="450" r="5" />
      <circle cx="400" cy="450" r="5" />
      <circle cx="440" cy="450" r="5" />
      <circle cx="480" cy="450" r="5" />
      <circle cx="520" cy="450" r="5" />
      <circle cx="560" cy="450" r="5" />
      <circle cx="600" cy="450" r="5" />
      <circle cx="640" cy="450" r="5" />
      <circle cx="680" cy="450" r="5" />
      <circle cx="720" cy="450" r="5" />
      <circle cx="760" cy="450" r="5" />
      <circle cx="800" cy="450" r="5" />
    </g>

    <!-- Entrance arch -->
    <path d="M540,500 L540,460 Q600,430 660,460 L660,500 Z" fill="#1a1a2e" opacity="0.3" />
  </g>

  <!-- Main Title with Theme Colors -->
  <g filter="url(#softShadow)">
    <!-- "ADCET" text with emerald accent -->
    <text x="600" y="200" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="90" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="4">
      ADCET
    </text>
    
    <!-- Decorative line -->
    <g transform="translate(600, 230)">
      <line x1="-200" y1="0" x2="-50" y2="0" stroke="url(#accentGradient)" stroke-width="3" opacity="0.8" />
      <circle cx="0" cy="0" r="6" fill="#28e092" />
      <circle cx="-25" cy="0" r="3" fill="#28e092" opacity="0.5" />
      <circle cx="25" cy="0" r="3" fill="#28e092" opacity="0.5" />
      <line x1="50" y1="0" x2="200" y2="0" stroke="url(#accentGradient)" stroke-width="3" opacity="0.8" />
    </g>

    <!-- "ALUMNI EVENTS" text -->
    <text x="600" y="295" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="46" font-weight="700" fill="#e0e7f0" text-anchor="middle" letter-spacing="8">
      ALUMNI EVENTS
    </text>
  </g>

  <!-- Tagline -->
  <text x="600" y="350" font-family="'Inter', system-ui, -apple-system, sans-serif" font-size="18" font-weight="400" fill="#8ba0b5" text-anchor="middle" letter-spacing="4" font-style="italic">
    RECONNECT · RELIVE · REDISCOVER
  </text>

  <!-- Small decorative bottom elements matching theme -->
  <g transform="translate(600, 390)" opacity="0.6">
    <rect x="-80" y="0" width="30" height="4" fill="#1ebd77" rx="2" />
    <rect x="-40" y="0" width="30" height="4" fill="#28e092" rx="2" />
    <rect x="0" y="0" width="30" height="4" fill="#1ebd77" rx="2" />
    <rect x="40" y="0" width="30" height="4" fill="#1ebd77" opacity="0.6" rx="2" />
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="497" width="1200" height="3" fill="url(#accentGradient)" rx="1.5" opacity="0.8" />
</svg>