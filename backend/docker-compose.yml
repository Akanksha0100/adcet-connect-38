# Local infrastructure: Postgres + MinIO. Run `docker compose up -d` to start.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: adcet
      POSTGRES_PASSWORD: adcet
      POSTGRES_DB: adcet_alumni
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adcet"]
      interval: 5s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: [miniodata:/data]

  createbuckets:
    image: minio/mc
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/adcet-alumni || true;
      mc anonymous set download local/adcet-alumni || true;
      exit 0;
      "

volumes:
  pgdata:
  miniodata: